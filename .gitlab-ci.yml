stages:
  - build
  - deploy-test
  - deploy-prod

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: reg.gitlab.radicalgeek.co.uk
  IMAGE_BACKEND: $REGISTRY/radicalgeek/openclaw-mission-control/backend
  IMAGE_FRONTEND: $REGISTRY/radicalgeek/openclaw-mission-control/frontend

.docker_build: &docker_build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY
    - arm64

build:backend:
  <<: *docker_build
  stage: build
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG=$(echo $CI_COMMIT_TAG | sed 's/^v//')
      else
        TAG="$CI_COMMIT_SHORT_SHA"
      fi
    - |
      # Backend build context is repo root; use custom Dockerfile (installs uv via pip)
      docker build \
        -f deploy/docker/backend.Dockerfile \
        -t $IMAGE_BACKEND:$TAG \
        -t $IMAGE_BACKEND:latest \
        .
    - docker push $IMAGE_BACKEND:$TAG
    - docker push $IMAGE_BACKEND:latest
    - echo "BACKEND_TAG=$TAG" >> build.env
  artifacts:
    reports:
      dotenv: build.env

build:frontend:
  <<: *docker_build
  stage: build
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG=$(echo $CI_COMMIT_TAG | sed 's/^v//')
      else
        TAG="$CI_COMMIT_SHORT_SHA"
      fi
    - |
      # Frontend build context is ./frontend/ directory
      docker build \
        --build-arg NEXT_PUBLIC_API_URL=https://mission-control.radicalgeek.co.uk/api \
        --build-arg NEXT_PUBLIC_AUTH_MODE=local \
        -t $IMAGE_FRONTEND:$TAG \
        -t $IMAGE_FRONTEND:latest \
        frontend/
    - docker push $IMAGE_FRONTEND:$TAG
    - docker push $IMAGE_FRONTEND:latest
    - echo "FRONTEND_TAG=$TAG" >> build.env
  artifacts:
    reports:
      dotenv: build.env

deploy:test:
  stage: deploy-test
  image: reg.gitlab.radicalgeek.co.uk/radicalgeek/hoofer/kubectl-arm:latest
  dependencies:
    - build:backend
    - build:frontend
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      export BACKEND_IMAGE="$IMAGE_BACKEND:$BACKEND_TAG"
      export FRONTEND_IMAGE="$IMAGE_FRONTEND:$FRONTEND_TAG"
      export NAMESPACE="mission-control"
      export ENVIRONMENT="test"
      export POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
      export LOCAL_AUTH_TOKEN="${LOCAL_AUTH_TOKEN}"
    - |
      # Deploy using envsubst to replace placeholders
      for f in deploy/k8s/*.yaml; do
        envsubst < "$f" | kubectl apply -f - --insecure-skip-tls-verify
      done
    - kubectl rollout status deployment/mission-control-backend -n $NAMESPACE --insecure-skip-tls-verify --timeout=5m
    - kubectl rollout status deployment/mission-control-frontend -n $NAMESPACE --insecure-skip-tls-verify --timeout=5m
  environment:
    name: test
    url: https://mission-control.radicalgeek.co.uk
  only:
    - main

deploy:prod:
  stage: deploy-prod
  image: reg.gitlab.radicalgeek.co.uk/radicalgeek/hoofer/kubectl-arm:latest
  dependencies:
    - build:backend
    - build:frontend
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
  script:
    - |
      export BACKEND_IMAGE="$IMAGE_BACKEND:$BACKEND_TAG"
      export FRONTEND_IMAGE="$IMAGE_FRONTEND:$FRONTEND_TAG"
      export NAMESPACE="mission-control"
      export ENVIRONMENT="prod"
      export POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
      export LOCAL_AUTH_TOKEN="${LOCAL_AUTH_TOKEN}"
    - |
      # Deploy using envsubst to replace placeholders
      for f in deploy/k8s/*.yaml; do
        envsubst < "$f" | kubectl apply -f - --insecure-skip-tls-verify
      done
    - kubectl rollout status deployment/mission-control-backend -n $NAMESPACE --insecure-skip-tls-verify --timeout=5m
    - kubectl rollout status deployment/mission-control-frontend -n $NAMESPACE --insecure-skip-tls-verify --timeout=5m
  environment:
    name: production
    url: https://mission-control.radicalgeek.co.uk
  when: manual
  only:
    - tags
