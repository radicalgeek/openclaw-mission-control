---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-worker
  namespace: mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control-worker
  template:
    metadata:
      labels:
        app: mission-control-worker
    spec:
      containers:
      - name: worker
        image: ${BACKEND_IMAGE}
        command: ['rq', 'worker', '--url', 'redis://mission-control-redis:6379/0', 'default']
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mission-control-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: redis://mission-control-redis:6379/0
        - name: RQ_REDIS_URL
          value: redis://mission-control-redis:6379/0
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
