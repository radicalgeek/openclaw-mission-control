  GITLAB_SKILLS_PROJECT_ID: "${GITLAB_SKILLS_PROJECT_ID}"
  GITLAB_SKILLS_TOKEN: "${GITLAB_SKILLS_TOKEN}"
  GITLAB_SKILLS_PROJECT_ID: "${GITLAB_SKILLS_PROJECT_ID}"
