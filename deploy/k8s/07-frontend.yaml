---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-frontend
  namespace: mission-control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mission-control-frontend
  template:
    metadata:
      labels:
        app: mission-control-frontend
    spec:
      imagePullSecrets:
      - name: dockerhub-registry
      containers:
      - name: frontend
        image: ${FRONTEND_IMAGE}
        ports:
        - containerPort: 3000
          name: http
        env:
        # NOTE: NEXT_PUBLIC_* vars are baked into the Next.js bundle at IMAGE BUILD TIME.
        # These runtime values only affect SSR env — they do NOT override the compiled bundle.
        # When building the image, pass the correct URL via --build-arg NEXT_PUBLIC_API_URL=...
        - name: NEXT_PUBLIC_API_URL
          value: https://mission-control.radicalgeek.co.uk/api
        - name: NEXT_PUBLIC_AUTH_MODE
          value: local
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mission-control-frontend
  namespace: mission-control
spec:
  selector:
    app: mission-control-frontend
  ports:
  - port: 3000
    targetPort: 3000
    name: http
