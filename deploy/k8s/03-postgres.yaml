---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mission-control-postgres-pvc
  namespace: mission-control
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: synology-iscsi-storage
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mission-control-postgres
  namespace: mission-control
spec:
  serviceName: mission-control-postgres
  replicas: 1
  selector:
    matchLabels:
      app: mission-control-postgres
  template:
    metadata:
      labels:
        app: mission-control-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: mission_control
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mission-control-secrets
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: mission-control-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mission-control-postgres
  namespace: mission-control
spec:
  selector:
    app: mission-control-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  clusterIP: None
